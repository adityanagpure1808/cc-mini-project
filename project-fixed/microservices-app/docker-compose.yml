version: "3.9"

services:

  # ─── DATABASES ────────────────────────────────────────────────────────────
  user-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    ports:
      - "5434:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── BACKEND SERVICES ────────────────────────────────────────────────────
  user-service:
    build: ./backend/user-service
    ports:
      - "8001:8000"
    env_file:
      - ./backend/user-service/.env
    depends_on:
      user-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  order-service:
    build: ./backend/order-service
    ports:
      - "8002:8000"
    env_file:
      - ./backend/order-service/.env
    depends_on:
      order-db:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── API GATEWAY + FRONTEND (NGINX) ──────────────────────────────────────
  # The gateway serves the React SPA on / and proxies API calls to services.
  # FIX: was missing entirely — frontend had no container; nginx had no / route.
  gateway:
    build:
      context: ..                          # repo root so frontend/ is reachable
      dockerfile: frontend/Dockerfile
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy

# ─── NAMED VOLUMES ────────────────────────────────────────────────────────
# FIX: volumes were missing — DB data was lost on every `docker compose down`
volumes:
  user-db-data:
  order-db-data:

networks:
  default:
    name: microservices-network
