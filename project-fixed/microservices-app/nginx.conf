events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # ── Frontend (React SPA) ──────────────────────────────────
        # Serve the built React app; fall back to index.html for client-side routing
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── User Service ──────────────────────────────────────────
        # Strips the /users prefix before forwarding to user-service
        location /users/ {
            rewrite ^/users/(.*)$ /$1 break;
            proxy_pass         http://user-service:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Order Service ─────────────────────────────────────────
        location /orders/ {
            rewrite ^/orders/(.*)$ /$1 break;
            proxy_pass         http://order-service:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Gateway health ────────────────────────────────────────
        location /health {
            proxy_pass http://user-service:8000/health;
        }
    }
}
