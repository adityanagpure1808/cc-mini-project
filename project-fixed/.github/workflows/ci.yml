name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint Backend ─────────────────────────────────────────────────────────
  test-backend:
    name: Lint Backend Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install user-service dependencies
        run: pip install -r microservices-app/backend/user-service/requirements.txt

      - name: Install order-service dependencies
        run: pip install -r microservices-app/backend/order-service/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 microservices-app/backend/ --max-line-length=120 --ignore=E501,W503

  # ─── Build Frontend ────────────────────────────────────────────────────────
  # FIX: cache-dependency-path was "frontend/package-lock.json" but the file
  #      lives at the repo root under frontend/. Also working-directory must
  #      match the actual path in this repo layout.
  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json   # relative to repo root

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ─── Build & Push Docker Images ───────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./microservices-app/backend/user-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/user-service:latest

      - name: Build & push order-service
        uses: docker/build-push-action@v5
        with:
          context: ./microservices-app/backend/order-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/order-service:latest

      # FIX: frontend Docker image build was missing from CI entirely
      - name: Build & push frontend (gateway)
        uses: docker/build-push-action@v5
        with:
          context: .                         # repo root — Dockerfile needs frontend/ and nginx.conf
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/frontend:latest
